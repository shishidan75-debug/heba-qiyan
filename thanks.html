<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提交成功 - 宁波禾八企业管理咨询</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        .thank-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f8f9fc 0%, #eef3f9 100%);
            padding: 24px;
        }
        .thank-card {
            background: #fff;
            border-radius: 20px;
            padding: 60px 48px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 50px rgba(0,0,0,0.06);
        }
        .thank-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #0052A4;
            color: #fff;
            font-size: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        .thank-card h1 {
            font-size: 28px;
            color: #1a1a2e;
            margin-bottom: 12px;
        }
        .thank-card p {
            font-size: 15px;
            color: #666;
            line-height: 1.8;
            margin-bottom: 32px;
        }
        .thank-card .btn {
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="thank-page">
        <div class="thank-card">
            <div class="thank-icon">&#10003;</div>
            <h1>提交成功！</h1>
            <p>感谢您的咨询，我们已收到您的信息。<br>资深顾问将在24小时内与您电话联系，<br>请保持手机畅通。</p>
            <a href="/heba-qiyan/" class="btn btn-primary">返回首页</a>
        </div>
    </div>
</body>
</html>
